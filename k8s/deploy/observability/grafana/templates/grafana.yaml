apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: "grafana"
spec:
  external:
    url: http://prometheus-grafana
    adminUser:
      name: grafana-admin-credentials
      key: username
    adminPassword:
      name: grafana-admin-credentials
      key: password