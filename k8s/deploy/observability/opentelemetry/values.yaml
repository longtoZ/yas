# Pin the contrib distribution: new enough for the operator-injected
# telemetry `readers` config, old enough to still include the `loki` exporter
# (removed upstream in later releases).
image: otel/opentelemetry-collector-contrib:0.119.0

opentelemetryCollectorConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    loki:
      protocols:
        http:
          endpoint: 0.0.0.0:3500
      use_incoming_timestamp: true
  processors:
    batch: {}
    attributes:
      actions:
        - action: insert
          key: loki.attribute.labels
          value: namespace,container,pod,level,traceId
        - action: insert
          key: loki.format
          value: raw
    # Blank out descriptions that differ between instrumentation libraries,
    # otherwise Prometheus remote-write rejects the series (upstream FIXME).
    transform:
      metric_statements:
        - context: metric
          statements:
            - set(description, "") where name == "queueSize"
            - set(description, "") where name == "rpc.server.duration"

  exporters:
    debug:
      verbosity: basic
    loki:
      endpoint: http://loki-gateway/loki/api/v1/push
    otlphttp:
      endpoint: http://tempo:4318
    prometheusremotewrite:
      endpoint: http://prometheus-kube-prometheus-prometheus:9090/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true # Convert resource attributes to metric labels
  service:
    pipelines:
      logs:
        receivers: [loki]
        processors: [attributes]
        exporters: [loki]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp]
      metrics:
        receivers: [otlp]
        processors: [transform, batch]
        exporters: [prometheusremotewrite]
