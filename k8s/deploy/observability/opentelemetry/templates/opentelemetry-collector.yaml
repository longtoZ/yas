apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: opentelemetry
spec:
  mode: deployment
  {{- with .Values.image }}
  image: {{ . }}
  {{- end }}
  ports:
    - name: loki
      port: 3500
      protocol: TCP
      targetPort: 3500
  config: |
    {{ toYaml .Values.opentelemetryCollectorConfig | nindent 4 }}