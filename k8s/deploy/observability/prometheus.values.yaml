hostname: &hostname grafana.yas.local.com
prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
grafana:
  # sqlite on a PVC instead of the postgres backend: datasources/dashboards are
  # provisioned by the grafana-operator anyway, so no DB credentials are needed.
  persistence:
    enabled: true
    size: 2Gi
  adminUser: admin
  adminPassword: admin
  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - *hostname
