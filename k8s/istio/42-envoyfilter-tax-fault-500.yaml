# DEMO-ONLY chaos: make the tax workload's own sidecar abort 50% of INBOUND
# requests with HTTP 500 before they reach the app. This simulates a flaky
# service so the retry policy (41-virtualservice-tax-retry.yaml) has something
# to retry.
#
# Server-side injection is deliberate: a fault injected by the CLIENT's
# VirtualService short-circuits before Envoy's router filter and is NOT
# retried, so it can't demonstrate retries.
#
# Apply only while demoing:   kubectl apply  -f 42-envoyfilter-tax-fault-500.yaml
# Remove afterwards:          kubectl delete -f 42-envoyfilter-tax-fault-500.yaml
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: tax-inbound-fault-500
  namespace: yas
spec:
  workloadSelector:
    labels:
      app.kubernetes.io/name: tax
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.fault
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
            abort:
              http_status: 500
              percentage:
                numerator: 50
                denominator: HUNDRED
