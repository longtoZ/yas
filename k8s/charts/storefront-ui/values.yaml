#          - key: .env.production
#            path: .env.production
#  extraVolumeMounts:
#    - name: storefront-env-production
#      mountPath: /app/.env.production
#      readOnly: true
#      subPath: .env.production
  extraEnvs:
    - name: API_BASE_PATH
      value: http://storefront.yas.local.com/api
  # UI is served by the storefront-bff gateway (its /** route), so no direct
