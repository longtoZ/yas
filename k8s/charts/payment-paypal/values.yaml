backend:
  # payment-paypal has no Spring Boot entrypoint (no @SpringBootApplication /
  # main class), so it cannot run as a service — deploy 0 replicas to keep it
  # from crashlooping. Set back to 1 if an application class is ever added.
  replicaCount: 0
  image:
    repository: baohuyhuy/yas-payment-paypal
    tag: main

  nameOverride: payment-paypal
  fullnameOverride: payment-paypal
  databaseName: payment-paypal
  ingress:
    enabled: false
  extraVolumes:
    - name: payment-paypal-application-config
      configMap:
        name: payment-paypal-application-configmap
  extraVolumeMounts:
    - name: payment-paypal-application-config
      mountPath: /opt/yas/payment-paypal
  extraApplicationConfigPaths:
    - /opt/yas/payment-paypal/payment-paypal-application.yaml