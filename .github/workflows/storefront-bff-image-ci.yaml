name: storefront-bff image ci

# On any branch push touching storefront-bff, build the image tagged with the commit id
# (and branch name) and push to Docker Hub. Reuses build-push-image.yaml.

on:
  push:
    paths:
      - 'storefront-bff/**'
      - 'pom.xml'
      - '.github/workflows/storefront-bff-image-ci.yaml'
      - '.github/workflows/build-push-image.yaml'
  workflow_dispatch:

jobs:
  build-push:
    uses: ./.github/workflows/build-push-image.yaml
    with:
      service: storefront-bff
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
