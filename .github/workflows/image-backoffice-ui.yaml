name: backoffice-ui image ci

# On any branch push touching the backoffice UI, build the Next.js image tagged with
# the commit id (and branch name) and push to Docker Hub. Reuses
# reusable-build-push-ui-image.yaml. Image name (yas-backoffice-ui) matches the chart so
# developer_build's per-service override resolves correctly.

on:
  push:
    paths:
      - 'backoffice/**'
      - '.github/workflows/image-backoffice-ui.yaml'
      - '.github/workflows/reusable-build-push-ui-image.yaml'
  workflow_dispatch:

jobs:
  build-push:
    uses: ./.github/workflows/reusable-build-push-ui-image.yaml
    with:
      context: backoffice
      image: yas-backoffice-ui
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
