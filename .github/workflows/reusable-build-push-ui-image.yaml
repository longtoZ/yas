name: Build and push UI image

# Reusable workflow for the Next.js UIs (storefront/backoffice). Unlike the
# Maven services these build entirely inside their multi-stage Dockerfile
# (npm ci + npm run build), so there's no separate jar/build step — just
# buildx + push. Image is tagged with the commit SHA and sanitized branch name.

on:
  workflow_call:
    inputs:
      context:
        description: 'UI source directory (e.g. storefront)'
        required: true
        type: string
      image:
        description: 'Image name without registry/user (e.g. yas-storefront-ui)'
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          # Docker tags can't contain '/', so sanitize branch names like feat/x -> feat-x
          branch="${GITHUB_REF_NAME//\//-}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}"  >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.context }}
          file: ./${{ inputs.context }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:${{ steps.meta.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:${{ steps.meta.outputs.branch }}

      - name: Summary
        run: |
          echo "### Pushed \`${{ inputs.image }}\` :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:${{ steps.meta.outputs.sha }}\` (commit id)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image }}:${{ steps.meta.outputs.branch }}\` (branch)" >> "$GITHUB_STEP_SUMMARY"
