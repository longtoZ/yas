name: customer image ci

# On any branch push touching customer, build the image tagged with the commit id
# (and branch name) and push to Docker Hub. Reuses reusable-build-push-image.yaml.

on:
  push:
    paths:
      - 'customer/**'
      - 'pom.xml'
      - '.github/workflows/image-customer.yaml'
      - '.github/workflows/reusable-build-push-image.yaml'
  workflow_dispatch:

jobs:
  build-push:
    uses: ./.github/workflows/reusable-build-push-image.yaml
    with:
      service: customer
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
