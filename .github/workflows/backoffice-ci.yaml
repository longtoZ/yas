name: backoffice service ci

on:
  push:
    branches: ['main']
    paths:
      - 'backoffice/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/backoffice-ci.yaml'
  pull_request:
    branches: ['main']
    paths:
      - 'backoffice/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/backoffice-ci.yaml'
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: backoffice

      - name: Run tests with coverage
        run: npm test
        working-directory: backoffice

      - name: Upload test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Jest Tests
          path: backoffice/test-results/junit.xml
          reporter: jest-junit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backoffice/coverage/
          retention-days: 7

      - name: Add coverage report to PR
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: backoffice/coverage/coverage-summary.json
          title: Backoffice Coverage Report
          badge-title: Coverage
          hide-comment: false
          create-new-comment: false

      - run: npm run lint
        working-directory: backoffice

      - run: npx prettier --check .
        continue-on-error: true
        working-directory: backoffice

      - run: npm audit --omit=dev
        continue-on-error: true
        working-directory: backoffice

      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: backoffice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  Build:
    runs-on: ubuntu-latest
    needs: Test
    permissions:
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backoffice
      - run: npm run build
        working-directory: backoffice
