name: backoffice service ci

on:
  push:
    branches: ['main']
    paths:
      - 'backoffice/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/backoffice-ci.yaml'
  pull_request:
    branches: ['main']
    paths:
      - 'backoffice/**'
      - '.github/workflows/actions/action.yaml'
      - '.github/workflows/backoffice-ci.yaml'
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backoffice
      - name: Run tests with coverage
        run: npm test
        working-directory: backoffice
      - name: Upload test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Jest Tests
          path: backoffice/test-results/junit.xml
          reporter: jest-junit
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backoffice/coverage/
          retention-days: 7
      - run: npm run lint
        working-directory: backoffice
      - run: npx prettier --check .
        working-directory: backoffice
      - run: npm audit --omit=dev
        continue-on-error: true
        working-directory: backoffice
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: './backoffice'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: backoffice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  Build:
    runs-on: ubuntu-latest
    needs: Test
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backoffice
      - run: npm run build
        working-directory: backoffice
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          tags: ghcr.io/nashtech-garage/yas-backoffice:latest
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/nashtech-garage/yas-backoffice:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./backoffice
          tags: ghcr.io/nashtech-garage/yas-backoffice:latest
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
