name: tax image ci

# On any branch push touching tax, build the image tagged with the commit id
# (and branch name) and push to Docker Hub. Reuses build-push-image.yaml.

on:
  push:
    paths:
      - 'tax/**'
      - 'pom.xml'
      - '.github/workflows/tax-image-ci.yaml'
      - '.github/workflows/build-push-image.yaml'
  workflow_dispatch:

jobs:
  build-push:
    uses: ./.github/workflows/build-push-image.yaml
    with:
      service: tax
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
