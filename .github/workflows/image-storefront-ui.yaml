name: storefront-ui image ci

# On any branch push touching the storefront UI, build the Next.js image tagged with
# the commit id (and branch name) and push to Docker Hub. Reuses
# reusable-build-push-ui-image.yaml. Image name (yas-storefront-ui) matches the chart so
# developer_build's per-service override resolves correctly.

on:
  push:
    paths:
      - 'storefront/**'
      - '.github/workflows/image-storefront-ui.yaml'
      - '.github/workflows/reusable-build-push-ui-image.yaml'
  workflow_dispatch:

jobs:
  build-push:
    uses: ./.github/workflows/reusable-build-push-ui-image.yaml
    with:
      context: storefront
      image: yas-storefront-ui
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
