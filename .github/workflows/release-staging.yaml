name: release-staging (GitOps)

# Assignment §6.2: tagging main with a release version (e.g. v1.2.3) builds
# versioned images for every service and deploys them to the `staging` namespace.
#
# On a v* tag, GITHUB_REF_NAME is the version string, so the reusable build-push
# workflows already tag images :v1.2.3 (plus the commit SHA). After all images
# are built, bump-staging pins envs/staging/values.yaml to that version in the
# config repo (baohuyhuy/yas-deploy); ArgoCD then deploys the immutable release.
#
# Requires repo secret DEPLOY_REPO_TOKEN (contents:write on yas-deploy).

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-images:
    strategy:
      fail-fast: false
      matrix:
        service: [cart, customer, inventory, location, media, order, payment,
                  product, promotion, rating, recommendation, sampledata,
                  search, tax, webhook, storefront-bff, backoffice-bff]
    uses: ./.github/workflows/build-push-image.yaml
    with:
      service: ${{ matrix.service }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  build-ui-images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { context: storefront, image: yas-storefront-ui }
          - { context: backoffice, image: yas-backoffice-ui }
    uses: ./.github/workflows/build-push-ui-image.yaml
    with:
      context: ${{ matrix.context }}
      image: ${{ matrix.image }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  bump-staging:
    needs: [build-images, build-ui-images]
    runs-on: ubuntu-latest
    steps:
      - name: Check out yas-deploy
        uses: actions/checkout@v4
        with:
          repository: baohuyhuy/yas-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}

      - name: Pin staging to ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          # Rewrite both backend.image.tag and ui.image.tag (4-space indented).
          sed -i "s/^    tag:.*/    tag: ${VERSION}/" envs/staging/values.yaml
          git config user.name  "yas-ci"
          git config user.email "yas-ci@users.noreply.github.com"
          if git diff --quiet; then echo "No change"; exit 0; fi
          git add envs/staging/values.yaml
          git commit -m "release(staging): ${VERSION}"
          git push
          echo "### staging pinned to \`${VERSION}\` :package:" >> "$GITHUB_STEP_SUMMARY"
