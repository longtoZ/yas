name: security - snyk vulnerability scan

on:
  push:
    branches: ['main']
    paths:
      - '**/pom.xml'
      - '.github/workflows/security-snyk.yaml'
  pull_request:
    branches: ['main']
    paths:
      - '**/pom.xml'
      - '.github/workflows/security-snyk.yaml'
  schedule:
    - cron: '0 1 * * 1' # Every Monday at 01:00 UTC
  workflow_dispatch:

jobs:
  Snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Resolve scan target
        id: target
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -oP '^[^/]+' \
              | sort -u \
              | while read dir; do [ -f "$dir/pom.xml" ] && echo "$dir"; done \
              | tr '\n' ' ' | xargs)
            if [ -n "$CHANGED" ]; then
              echo "services=$CHANGED" >> $GITHUB_OUTPUT
              echo "scope=$(echo $CHANGED | tr ' ' ',')" >> $GITHUB_OUTPUT
            else
              echo "services=" >> $GITHUB_OUTPUT
              echo "scope=all services" >> $GITHUB_OUTPUT
            fi
          else
            echo "services=" >> $GITHUB_OUTPUT
            echo "scope=all services" >> $GITHUB_OUTPUT
          fi

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # Snyk's Maven scanner shells out to `mvn dependency:tree`, which needs
      # the reactor parent POM and the in-repo `common-library` artifact to be
      # resolvable from ~/.m2. Without this pre-install, every service that
      # depends on com.yas:common-library fails with SNYK-OS-MAVEN-0018.
      - name: Prime local Maven repo (parent POM + common-library)
        run: |
          mvn -B -N -DskipTests -Dcheckstyle.skip -Dspotless.check.skip=true install
          mvn -B -pl common-library -am -DskipTests -Dcheckstyle.skip -Dspotless.check.skip=true install

      - name: Snyk vulnerability scan (${{ steps.target.outputs.scope }})
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          find . -name "mvnw" -exec chmod +x {} +

          SERVICES="${{ steps.target.outputs.services }}"

          if [ -z "$SERVICES" ]; then
            # Discover every top-level service with a pom.xml (skip the parent reactor pom)
            SERVICES=$(find . -mindepth 2 -maxdepth 2 -name "pom.xml" \
              | sed 's|^\./||; s|/pom.xml$||' \
              | sort -u | tr '\n' ' ')
          fi

          echo "Scanning services: $SERVICES"

          mkdir -p sarif-parts
          for SERVICE in $SERVICES; do
            SAFE_NAME=$(echo "$SERVICE" | tr '/' '-')
            echo "::group::Snyk scan: $SERVICE"
            snyk test --severity-threshold=high \
              --file=$SERVICE/pom.xml \
              --sarif-file-output=sarif-parts/${SAFE_NAME}.sarif || true
            echo "::endgroup::"
          done

      - name: Pack SARIF parts into batches (<=20 runs each)
        if: always()
        id: pack
        run: |
          if ! ls sarif-parts/*.sarif >/dev/null 2>&1; then
            echo "No SARIF files produced; nothing to upload."
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          mkdir -p sarif-batches
          batch=1
          count=0
          files=()

          flush() {
            if [ ${#files[@]} -gt 0 ]; then
              jq -s '{
                version: "2.1.0",
                "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                runs: (map(.runs) | add)
              }' "${files[@]}" > "sarif-batches/batch-${batch}.sarif"
              echo "Batch ${batch}: ${#files[@]} services, ${count} runs"
              batch=$((batch + 1))
              count=0
              files=()
            fi
          }

          for f in sarif-parts/*.sarif; do
            runs=$(jq '.runs | length' "$f" 2>/dev/null || echo 0)
            [ "$runs" -eq 0 ] && continue
            if [ "$((count + runs))" -gt 20 ]; then
              flush
            fi
            files+=("$f")
            count=$((count + runs))
          done
          flush

          total=$((batch - 1))
          echo "count=$total" >> $GITHUB_OUTPUT
          ls -la sarif-batches/

      - name: Upload SARIF batch 1
        if: always() && hashFiles('sarif-batches/batch-1.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-batches/batch-1.sarif
          category: snyk-batch-1

      - name: Upload SARIF batch 2
        if: always() && hashFiles('sarif-batches/batch-2.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-batches/batch-2.sarif
          category: snyk-batch-2

      - name: Upload SARIF batch 3
        if: always() && hashFiles('sarif-batches/batch-3.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-batches/batch-3.sarif
          category: snyk-batch-3
