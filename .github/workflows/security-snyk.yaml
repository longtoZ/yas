name: security - snyk vulnerability scan

on:
  push:
    branches: ['main']
    paths:
      - '**/pom.xml'
      - '.github/workflows/security-snyk.yaml'
  pull_request:
    branches: ['main']
    paths:
      - '**/pom.xml'
      - '.github/workflows/security-snyk.yaml'
  schedule:
    - cron: '0 1 * * 1' # Every Monday at 01:00 UTC
  workflow_dispatch:

jobs:
  Snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || startsWith(github.head_ref, 'test/') }}
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - uses: ./.github/workflows/actions

      - name: Resolve scan target
        id: target
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SERVICE=$(echo "${{ github.head_ref }}" | sed 's|test/||')
            echo "args=--file=$SERVICE/pom.xml" >> $GITHUB_OUTPUT
            echo "scope=$SERVICE only" >> $GITHUB_OUTPUT
          else
            echo "args=--all-projects" >> $GITHUB_OUTPUT
            echo "scope=all services" >> $GITHUB_OUTPUT
          fi

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk vulnerability scan (${{ steps.target.outputs.scope }})
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          find . -name "mvnw" -exec chmod +x {} +

          snyk test --severity-threshold=high \
            ${{ steps.target.outputs.args }} \
            -d \
            --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk.sarif
