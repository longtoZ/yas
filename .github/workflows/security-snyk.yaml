name: security - snyk vulnerability scan

on:
  push:
    branches: ['main']
    paths:
      - '**/pom.xml'
      - '.github/workflows/security-snyk.yaml'
  pull_request:
    branches: ['main']
    paths:
      - '**/pom.xml'
      - '.github/workflows/security-snyk.yaml'
  schedule:
    - cron: '0 1 * * 1' # Every Monday at 01:00 UTC
  workflow_dispatch:

jobs:
  Snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Resolve scan target
        id: target
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -oP '^[^/]+' \
              | sort -u \
              | while read dir; do [ -f "$dir/pom.xml" ] && echo "$dir"; done \
              | tr '\n' ' ' | xargs)
            if [ -n "$CHANGED" ]; then
              echo "services=$CHANGED" >> $GITHUB_OUTPUT
              echo "scope=$(echo $CHANGED | tr ' ' ',')" >> $GITHUB_OUTPUT
            else
              echo "services=" >> $GITHUB_OUTPUT
              echo "scope=all services" >> $GITHUB_OUTPUT
            fi
          else
            echo "services=" >> $GITHUB_OUTPUT
            echo "scope=all services" >> $GITHUB_OUTPUT
          fi

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # Defence-in-depth: prime ~/.m2 with the reactor parent POM and
      # common-library so that any Maven invocation Snyk does locally can
      # resolve `com.yas:*:${revision}` artifacts. The aggregate scan below
      # would normally handle this on its own via the Maven reactor, but
      # installing first also unblocks any single-module fallbacks.
      - name: Prime local Maven repo (parent POM + common-library)
        run: |
          mvn -B -N -DskipTests -Dcheckstyle.skip -Dspotless.check.skip=true install
          mvn -B -pl common-library -am -DskipTests -Dcheckstyle.skip -Dspotless.check.skip=true install

      # Sanity check: prove `mvn dependency:tree` works for one of the
      # services that previously failed. If this step fails, the Snyk run
      # below would have failed with SNYK-OS-MAVEN-0018 too — and the log
      # here will tell us exactly which dependency could not be resolved.
      - name: Verify Maven dependency tree resolves
        run: mvn -B -pl cart -am dependency:tree -DskipTests -Dcheckstyle.skip -Dspotless.check.skip=true

      # Run a single aggregate scan against the reactor root. This makes Snyk
      # invoke `mvn dependency:tree` on the parent POM, so:
      #   * `${revision}` is resolved by the same reactor;
      #   * sibling modules (common-library) are resolved in-process;
      #   * we get one SARIF "run" per module, which we then split below.
      - name: Snyk vulnerability scan (${{ steps.target.outputs.scope }})
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          mkdir -p sarif-parts
          echo "::group::Snyk aggregate scan (Maven reactor)"
          snyk test \
            --severity-threshold=high \
            --maven-aggregate-project \
            --sarif-file-output=sarif-parts/_combined.sarif || true
          echo "::endgroup::"

          if [ ! -s sarif-parts/_combined.sarif ]; then
            echo "Snyk produced no SARIF; nothing to split."
            exit 0
          fi

          # Split the combined SARIF into one file per run so the existing
          # batching step (max 20 runs per upload) keeps working unchanged.
          RUNS=$(jq '.runs | length' sarif-parts/_combined.sarif)
          echo "Splitting $RUNS runs into per-module SARIF files"
          for i in $(seq 0 $((RUNS - 1))); do
            NAME=$(jq -r ".runs[$i].properties.projectName // \"run-$i\"" sarif-parts/_combined.sarif \
              | tr '/: ' '---')
            jq "{
              version: .version,
              \"\$schema\": .\"\$schema\",
              runs: [.runs[$i]]
            }" sarif-parts/_combined.sarif > "sarif-parts/${NAME}.sarif"
          done
          rm sarif-parts/_combined.sarif
          ls -la sarif-parts/

      - name: Pack SARIF parts into batches (<=20 runs each)
        if: always()
        id: pack
        run: |
          if ! ls sarif-parts/*.sarif >/dev/null 2>&1; then
            echo "No SARIF files produced; nothing to upload."
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          mkdir -p sarif-batches
          batch=1
          count=0
          files=()

          flush() {
            if [ ${#files[@]} -gt 0 ]; then
              jq -s '{
                version: "2.1.0",
                "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                runs: (map(.runs) | add)
              }' "${files[@]}" > "sarif-batches/batch-${batch}.sarif"
              echo "Batch ${batch}: ${#files[@]} services, ${count} runs"
              batch=$((batch + 1))
              count=0
              files=()
            fi
          }

          for f in sarif-parts/*.sarif; do
            runs=$(jq '.runs | length' "$f" 2>/dev/null || echo 0)
            [ "$runs" -eq 0 ] && continue
            if [ "$((count + runs))" -gt 20 ]; then
              flush
            fi
            files+=("$f")
            count=$((count + runs))
          done
          flush

          total=$((batch - 1))
          echo "count=$total" >> $GITHUB_OUTPUT
          ls -la sarif-batches/

      - name: Upload SARIF batch 1
        if: always() && hashFiles('sarif-batches/batch-1.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-batches/batch-1.sarif
          category: snyk-batch-1

      - name: Upload SARIF batch 2
        if: always() && hashFiles('sarif-batches/batch-2.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-batches/batch-2.sarif
          category: snyk-batch-2

      - name: Upload SARIF batch 3
        if: always() && hashFiles('sarif-batches/batch-3.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-batches/batch-3.sarif
          category: snyk-batch-3
