name: payment image ci

# On every push to ANY branch that touches the payment service, build the
# payment image tagged with the commit id and push it to Docker Hub.
# (The existing payment-ci.yaml keeps running tests/coverage on main.)

on:
  push:
    paths:
      - 'payment/**'
      - 'pom.xml'
      - '.github/workflows/payment-image-ci.yaml'
      - '.github/workflows/build-push-image.yaml'
  workflow_dispatch:

jobs:
  build-push:
    uses: ./.github/workflows/build-push-image.yaml
    with:
      service: payment
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
